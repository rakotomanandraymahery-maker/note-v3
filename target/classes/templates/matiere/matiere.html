<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestion des Matières</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/note.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="main-content">

        <!-- <div class="success-message" th:if="${success}" th:text="${success}"></div> -->
        <div class="error-message" th:if="${error}" th:text="${error}"></div>

        <div class="two-columns">

            <div class="left-column">
                <h3>Liste des Matières</h3>
                
                <table class="notes-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Coefficient</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="matiere : ${matieres}">
                            <td th:text="${matiere.id}">1</td>
                            <td th:text="${matiere.nom}">Mathématiques</td>
                            <td th:text="${matiere.coef}">3</td>
                            <td class="actions">
                                <a class="edit-btn" th:href="@{/matiere/edit/{id}(id=${matiere.id})}">Modifier</a>
                                <a class="delete-btn" th:href="@{/matiere/delete/{id}(id=${matiere.id})}" 
                                   onclick="return confirm('Supprimer cette matière ?')">Supprimer</a>
                            </td>
                        </tr>
                        <tr th:if="${matieres.empty}">
                            <td colspan="4" class="empty-message">Aucune matière</td>
                        </tr>
                    </tbody>
                </table>
            </div>
    
            <div class="right-column">
                <h3 th:text="${matiere.id != null ? 'Modifier Matière' : 'Ajouter Matière'}">
                    Ajouter Matière
                </h3>
                
                <form class="note-form" th:action="@{/matiere/save}" method="post" th:object="${matiere}">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="form-group">
                        <label for="nom">Nom de la matière :</label>
                        <input type="text" id="nom" th:field="*{nom}" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="coef">Coefficient :</label>
                        <input type="number" id="coef" th:field="*{coef}" min="1" required />
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" th:text="${matiere.id != null ? 'Modifier' : 'Ajouter'}">
                            Ajouter
                        </button>
                        <a class="cancel-btn" th:href="@{/matiere/cancel}">Annuler</a>
                    </div>
                </form>
            </div>
            
        </div>
        
    </div>

</body>
</html>
