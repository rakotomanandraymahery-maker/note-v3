# Configuration de la base de données MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/forage_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Désactiver la console H2 (pas besoin avec MySQL)
spring.h2.console.enabled=false

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuration du serveur
server.port=8080

# Configuration du logging
logging.level.org.springframework=INFO
logging.level.com.example.forage=DEBUG

# Configuration pour la gestion des relations JPA
# Évite les problèmes de chargement paresseux (lazy loading)
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
