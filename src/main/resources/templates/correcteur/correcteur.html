<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestion des Correcteurs</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/note.css}">
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="main-content">

        <!-- <div class="success-message" th:if="${success}" th:text="${success}"></div> -->
        <div class="error-message" th:if="${error}" th:text="${error}"></div>

        <div class="two-columns">
            
            <div class="left-column">
                <h3>Liste des Correcteurs</h3>
                
                <table class="notes-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Adresse</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="correcteur : ${correcteurs}">
                            <td th:text="${correcteur.id}">1</td>
                            <td th:text="${correcteur.nom}">Doe</td>
                            <td th:text="${correcteur.prenom}">John</td>
                            <td th:text="${correcteur.adresse}">Adresse</td>
                            <td class="actions">
                                <a class="edit-btn" th:href="@{/correcteur/edit/{id}(id=${correcteur.id})}">Modifier</a>
                                <a class="delete-btn" th:href="@{/correcteur/delete/{id}(id=${correcteur.id})}" 
                                   onclick="return confirm('Supprimer ce correcteur ?')">Supprimer</a>
                            </td>
                        </tr>
                        <tr th:if="${correcteurs.empty}">
                            <td colspan="5" class="empty-message">Aucun correcteur</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="right-column">
                <h3 th:text="${correcteur.id != null ? 'Modifier Correcteur' : 'Ajouter Correcteur'}">
                    Ajouter Correcteur
                </h3>
                
                <form class="note-form" th:action="@{/correcteur/save}" method="post" th:object="${correcteur}">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="form-group">
                        <label for="nom">Nom :</label>
                        <input type="text" id="nom" th:field="*{nom}" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="prenom">Prénom :</label>
                        <input type="text" id="prenom" th:field="*{prenom}" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="adresse">Adresse :</label>
                        <textarea id="adresse" th:field="*{adresse}" rows="3"></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" th:text="${correcteur.id != null ? 'Modifier' : 'Ajouter'}">
                            Ajouter
                        </button>
                        <a class="cancel-btn" th:href="@{/correcteur/cancel}">Annuler</a>
                    </div>
                </form>
            </div>
            
        </div> 
        
    </div>

</body>
</html>
