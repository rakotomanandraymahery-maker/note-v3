<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Debug API</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
        .success { background: #28a745; color: white; }
        .error { background: #dc3545; color: white; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Debug API Système de Forage</h1>
    
    <div class="section">
        <h2>Test API Clients</h2>
        <button onclick="testClients()" class="success">Tester GET /api/clients</button>
        <button onclick="createClient()" class="success">Créer Client Test</button>
        <pre id="clientsResult">Résultat...</pre>
    </div>
    
    <div class="section">
        <h2>Test API Demandes</h2>
        <button onclick="testDemandes()" class="success">Tester GET /api/demandes</button>
        <pre id="demandesResult">Résultat...</pre>
    </div>
    
    <div class="section">
        <h2>Console de Debug</h2>
        <button onclick="clearConsole()" class="error">Vider Console</button>
        <pre id="debugConsole">Console de debug...</pre>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';
        
        function log(message) {
            const console = document.getElementById('debugConsole');
            const timestamp = new Date().toLocaleTimeString();
            console.textContent += `[${timestamp}] ${message}\n`;
        }
        
        function testClients() {
            log('Test GET /api/clients');
            fetch(`${API_URL}/clients`)
                .then(response => {
                    log(`Status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    log(`Données reçues: ${JSON.stringify(data, null, 2)}`);
                    document.getElementById('clientsResult').textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    log(`Erreur: ${error.message}`);
                    document.getElementById('clientsResult').textContent = `ERREUR: ${error.message}`;
                });
        }
        
        function createClient() {
            log('Création client test');
            const testClient = {
                nom: 'Client Test Debug',
                contact: 'test@debug.com',
                devis: 1234.56
            };
            
            fetch(`${API_URL}/clients`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(testClient)
            })
                .then(response => {
                    log(`Status création: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    log(`Client créé: ${JSON.stringify(data, null, 2)}`);
                    testClients(); // Recharger la liste
                })
                .catch(error => {
                    log(`Erreur création: ${error.message}`);
                });
        }
        
        function testDemandes() {
            log('Test GET /api/demandes');
            fetch(`${API_URL}/demandes`)
                .then(response => {
                    log(`Status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    log(`Données demandes: ${JSON.stringify(data, null, 2)}`);
                    document.getElementById('demandesResult').textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    log(`Erreur demandes: ${error.message}`);
                    document.getElementById('demandesResult').textContent = `ERREUR: ${error.message}`;
                });
        }
        
        function clearConsole() {
            document.getElementById('debugConsole').textContent = 'Console vidée...';
        }
        
        // Test automatique au chargement
        window.onload = function() {
            log('Page de debug chargée');
            testClients();
        };
    </script>
</body>
</html>
